<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>PyScript Shell Web</title>
        <link rel="icon" type="image/png"
            href="https://github.com/azzammuhyala/pyscript/blob/main/PyScript.png?raw=true">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css">
        <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
        <style>
            body {
                margin: 0;
                padding: 8px;
                box-sizing: border-box;
                width: 100vw;
                height: 100vh;
                overflow: hidden;
                background: #2a2a2a;
            }

            #terminal-container {
                width: 100%;
                height: 100%;
                border-radius: 8px;
                overflow: hidden;
                background: #000000;
            }
        </style>
    </head>

    <body>
        <div id="terminal-container"></div>
        <script type="module">
            const pyodideURL = 'https://cdn.jsdelivr.net/pyodide/v0.29.4/full';

            const bind = (object, methodName) => object[methodName].bind(object);
            const dedent = (string) => {
                const lines = string.replace(/\r\n|\r/g, '\n').split('\n');
                const indents = lines.filter(line => line.trim().length > 0)
                                     .map(   line => line.match(/^ */)[0].length);
                const minimumIndent = indents.length ? Math.min(...indents) : 0;
                return lines.map(line => {
                    if (line.trim().length === 0) return line;
                    return line.slice(Math.min(minimumIndent, line.match(/^ */)[0].length));
                }).join('\n');
            };

            const terminal = new Terminal({
                cursorBlink: true,
                theme: { background: '#000000' },
                fontSize: 15,
                fontFamily: 'Consolas, Menlo, Monaco, "Courier New", monospace'
            });
            const fitAddon = new FitAddon.FitAddon();

            terminal.loadAddon(fitAddon);
            terminal.open(document.getElementById('terminal-container'));
            fitAddon.fit();
            window.addEventListener('resize', bind(fitAddon, 'fit'));

            window.linesBuffer = [];
            window.terminal = terminal;
            window.exitCode = 0;

            const isNewline = bind(['\n', '\r'], 'includes');

            const linesBuffer = window.linesBuffer;
            const lineBuffer = [];
            let cursor = 0;

            terminal.onData(data => {
                const above = () => cursor > 0;
                const below = () => cursor < lineBuffer.length;

                switch (data) {

                    // Ctrl + C (INT)
                    case '\x03':
                        terminal.write('\r\n');
                        linesBuffer.length = 0;
                        lineBuffer.length = 0;
                        linesBuffer.push('\x03');
                        cursor = 0;
                        break;

                    // Ctrl + D/Z (EOF)
                    case '\x04':
                    case '\x1a':
                        terminal.write('\r\n');
                        linesBuffer.length = 0;
                        lineBuffer.length = 0;
                        linesBuffer.push('\x1a');
                        cursor = 0;
                        break;

                    // Enter
                    case '\n':
                    case '\r':
                        terminal.write('\r\n');
                        linesBuffer.push(lineBuffer.join(''));
                        lineBuffer.length = 0;
                        cursor = 0;
                        break;

                    // Backspace
                    case '\x7f':
                        if (above()) {
                            cursor--;
                            terminal.write('\x1b[D\x1b[P');
                            lineBuffer.splice(cursor, 1);
                        }
                        break;

                    // Delete
                    case '\x1b[3~':
                        if (below()) {
                            terminal.write('\x1b[P');
                            lineBuffer.splice(cursor, 1);
                        }
                        break;

                    // Home
                    case '\x1b[H':
                        if (above()) {
                            terminal.write(`\x1b[${cursor}D`);
                            cursor = 0;
                        }
                        break;

                    // End
                    case '\x1b[F':
                        if (below()) {
                            terminal.write(`\x1b[${lineBuffer.length - cursor}C`);
                            cursor = lineBuffer.length;
                        }
                        break;

                    // Right
                    case '\x1b[C':
                        if (below()) {
                            terminal.write(data);
                            cursor++;
                        }
                        break;

                    // Left
                    case '\x1b[D':
                        if (above()) {
                            terminal.write(data);
                            cursor--;
                        }
                        break;

                    default:
                        let buffer = '';
                        for (const character of data) {
                            const code = character.charCodeAt(0);
                            if (isNewline(character)) {
                                buffer += ';';
                            }
                            else if (code === 0x09) {
                                buffer += '    ';
                            }
                            else if (0x20 <= code && code <= 0x7e) {
                                buffer += character;
                            }
                        }
                        if (buffer) {
                            if (below()) {
                                terminal.write(`\x1b[${buffer.length}@`);
                            }
                            terminal.write(buffer);
                            lineBuffer.splice(cursor, 0, ...buffer);
                            cursor += buffer.length;
                        }
                        break;
                }
            });

            terminal.write('Loading pyodide\r\n');

            const { loadPyodide } = await import(`${pyodideURL}/pyodide.mjs`);
            const pyodide = await loadPyodide();

            window.pyodide = pyodide;

            pyodide.setStdout({
                raw: (characterCode) => {
                    const character = String.fromCharCode(characterCode);
                    terminal.write(isNewline(character) ? '\r\n' : character);
                }
            });

            pyodide.setStderr({
                raw: (characterCode) => {
                    const character = String.fromCharCode(characterCode);
                    terminal.write(isNewline(character) ? '\r\n' : character);
                }
            });

            await pyodide.runPythonAsync(dedent(`
                from js import linesBuffer
                from asyncio import sleep
                from pyodide.ffi import run_sync as run
                # from asyncio import run

                import sys
                import builtins

                signals = {
                    '\\x03': KeyboardInterrupt,
                    '\\x1a': EOFError
                }

                async def async_readline():
                    while not linesBuffer:
                        await sleep(0.1)
                    return linesBuffer.shift()

                def readline(*args, **kwargs):
                    line = run(async_readline(*args, **kwargs))
                    if line in signals:
                        raise signals[line]
                    return line

                def input(prompt=''):
                    if prompt:
                        print(end=prompt, flush=True)
                    return readline()

                sys.stdin.readline = readline
                builtins.input = input
            `), { globals: pyodide.globals.get('dict')() });

            await pyodide.loadPackage('micropip');
            const micropip = pyodide.pyimport('micropip');

            terminal.write('Loading pyscript\r\n');
            await micropip.install('pyscript-programming-language');

            await pyodide.runPythonAsync(dedent(`
                import js
                import pyscript

                pys_sys = pyscript.pys_require('sys')
                pys_sys.clearhook = lambda : js.terminal.clear()

                js.terminal.clear()
                print(f'Welcome to the PyScript shell using Pyodide {js.pyodide.version}')
                js.exitCode = pyscript.pys_shell(pyscript.undefined, pyscript.CLASSIC_LINE_SHELL)
            `));

            terminal.write(
                window.exitCode === 0 ?
                `\r\n\x1b[36m[Shell finished with exit code 0]\x1b[0m\r\n` :
                `\r\n\x1b[31m[Shell finished with exit code ${JSON.stringify(window.exitCode)}]\x1b[0m\r\n`
            );
        </script>
    </body>
</html>
