<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
        <title>PyScript Shell</title>
        <link
            rel="icon"
            type="image/png"
            href="https://github.com/azzammuhyala/pyscript/blob/main/PyScript.png?raw=true"
        >
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm/css/xterm.min.css">
        <script src="https://cdn.jsdelivr.net/npm/xterm/lib/xterm.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit/lib/xterm-addon-fit.js"></script>
        <style>
            body {
                width: 100vw;
                height: 100vh;
                margin: 0;
                padding: 10px;
                box-sizing: border-box;
                overflow: hidden;
                background: #202020;
                position: fixed;
                top: 0;
                left: 0;
                overscroll-behavior: none;
            }

            #terminal-container {
                width: 100%;
                height: 100%;
                border-radius: 8px;
                overflow: hidden;
                background: #000000;
                touch-action: pan-y;
            }
        </style>
    </head>

    <body>
        <div id="terminal-container"></div>
        <script type="module">
            const PYODIDE_URL = 'https://cdn.jsdelivr.net/pyodide/v0.29.4/full/pyodide.mjs';
            const MAXIMUM_HISTORY_LINE = 1000;

            function bind(object, methodName) {
                return object[methodName].bind(object)
            }

            function dedent(string) {
                const lines = string.replace(/\r\n|\r/g, '\n').split('\n');
                const indents = lines.filter(line => line.trim().length > 0)
                                     .map(   line => line.match(/^ */)[0].length);
                const minimumIndent = indents.length ? Math.min(...indents) : 0;
                return lines.map(line => {
                    if (line.trim().length === 0) return line;
                    return line.slice(Math.min(minimumIndent, line.match(/^ */)[0].length));
                }).join('\n');
            }

            const terminal = new Terminal({
                theme: { background: '#000000' },
                fontSize: 15,
                fontFamily: 'Consolas, Menlo, Monaco, "Courier New", monospace',
                cursorBlink: true,
                screenReaderMode: true
            });
            const fitAddon = new FitAddon.FitAddon();

            terminal.loadAddon(fitAddon);
            terminal.open(document.getElementById('terminal-container'));

            const fit = bind(fitAddon, 'fit')

            fit();

            if (window.visualViewport) {

                function resizeToViewport() {
                    if (window.visualViewport) {
                        const vv = window.visualViewport;
                        document.body.style.height = `${vv.height}px`;
                        document.body.style.top = `${vv.offsetTop}px`;
                    }
                    fit();
                }

                window.visualViewport.addEventListener('resize', resizeToViewport);
                window.visualViewport.addEventListener('scroll', resizeToViewport);
            }
            else {
                window.addEventListener('resize', fit);
            }

            let cursor = 0;
            let historyCursor = 0;
            const history = [];
            const inputQueue = [];
            const linesQueue = [];
            const lineBuffer = [];
            const pyscriptGlobals = {
                MAXIMUM_HISTORY_LINE: MAXIMUM_HISTORY_LINE,
                terminal: terminal,
                history: history,
                inputQueue: inputQueue,
                linesQueue: linesQueue,
                clearHistory: () => {
                    historyCursor = 0;
                    history.length = 0;
                },
                isWaitingForInput: false,
                exitCode: 0
            };

            window.pyscriptGlobals = pyscriptGlobals;

            const isNewline = bind([10, 13], 'includes');
            const above = () => cursor > 0;
            const below = () => cursor < lineBuffer.length;

            function sendSignal(code) {
                cursor = 0;
                linesQueue.length = 0;
                lineBuffer.length = 0;
                linesQueue.push(code);
            }

            function pushBuffer(buffer) {
                if (!buffer) return;
                if (below()) terminal.write(`\x1b[${buffer.length}@`);
                terminal.write(buffer);
                lineBuffer.splice(cursor, 0, ...buffer);
                cursor += buffer.length;
            }

            function flushLineHistory() {
                if (above()) {
                    terminal.write(`\x1b[${cursor}D${' '.repeat(lineBuffer.length)}\x1b[${lineBuffer.length}D`);
                    cursor = 0;
                }
                if (historyCursor === history.length) {
                    lineBuffer.length = 0;
                    return;
                }
                const line = history[historyCursor];
                terminal.write(line);
                lineBuffer.length = 0;
                lineBuffer.push(...line);
                cursor += line.length;
            }

            function pushLineHistory(line) {
                if (!line.trim() || line === history[history.length - 1]){
                    historyCursor = history.length;
                    return;
                }
                if (history.length >= MAXIMUM_HISTORY_LINE) history.shift();
                history.push(line);
                historyCursor = history.length;
            }

            function pushLine() {
                terminal.write('\r\n');
                const line = lineBuffer.join('');
                linesQueue.push(line);
                pushLineHistory(line);
                lineBuffer.length = 0;
                cursor = 0;
            }

            function processInputCharacter(data) {
                if (!pyscriptGlobals.isWaitingForInput) {
                    return;
                }

                switch (data) {

                    // Ctrl + C (INT)
                    case '\x03':
                        sendSignal('\x03');
                        break;

                    // Ctrl + D/Z (EOF)
                    case '\x04':
                    case '\x1a':
                        sendSignal('\x1a');
                        break;

                    // Enter
                    case '\n':
                    case '\r':
                    case '\r\n':
                        pushLine();
                        break;

                    // Backspace
                    case '\x7f':
                        if (!above()) break;
                        cursor--;
                        terminal.write('\x1b[D\x1b[P');
                        lineBuffer.splice(cursor, 1);
                        break;

                    // Delete
                    case '\x1b[3~':
                        if (!below()) break;
                        terminal.write('\x1b[P');
                        lineBuffer.splice(cursor, 1);
                        break;

                    // Home
                    case '\x1b[H':
                        if (!above()) break;
                        terminal.write(`\x1b[${cursor}D`);
                        cursor = 0;
                        break;

                    // End
                    case '\x1b[F':
                        if (!below()) break;
                        terminal.write(`\x1b[${lineBuffer.length - cursor}C`);
                        cursor = lineBuffer.length;
                        break;

                    // Up
                    case '\x1b[A':
                        if (history.length <= 0 || historyCursor <= 0) break;
                        historyCursor--;
                        flushLineHistory();
                        break;

                    // Down
                    case '\x1b[B':
                        if (historyCursor >= history.length) break;
                        historyCursor++;
                        flushLineHistory();
                        break;

                    // Right
                    case '\x1b[C':
                        if (!below()) break;
                        terminal.write(data);
                        cursor++;
                        break;

                    // Left
                    case '\x1b[D':
                        if (!above()) break;
                        terminal.write(data);
                        cursor--;
                        break;

                    default:
                        let buffer = '';
                        let index = 0;

                        for (const character of data) {
                            switch (character) {

                                case '\n':
                                case '\r':
                                    pushBuffer(buffer);
                                    pushLine();
                                    inputQueue.push(data.slice(index + 1));
                                    return;

                                case '\t':
                                    buffer += '    ';
                                    break;

                                case '\x1b':
                                    break;

                                default:
                                    buffer += character;
                                    break;

                            }
                            index++;
                        }

                        pushBuffer(buffer);
                        break;
                }
            }

            pyscriptGlobals.processInputCharacter = processInputCharacter;

            const disposable = terminal.onData(data => {
                if (pyscriptGlobals.isWaitingForInput) processInputCharacter(data);
                else inputQueue.push(data);
            });

            terminal.write('Loading pyodide\r\n');

            const { loadPyodide } = await import(PYODIDE_URL);
            const pyodide = await loadPyodide();

            terminal.write('Loaded pyodide\r\n');

            terminal.write('Preparing environment\r\n');

            pyodide.setStdout({
                raw: (code) => {
                    terminal.write(isNewline(code) ? '\r\n' : String.fromCharCode(code));
                }
            });

            pyodide.setStderr({
                raw: (code) => {
                    terminal.write(isNewline(code) ? '\r\n' : String.fromCharCode(code));
                }
            });

            async function runPythonAsync(code) {
                await pyodide.runPythonAsync(dedent(code), {globals: pyodide.globals.get('dict')()});
            }

            // prepare input standards
            await runPythonAsync(`
                from asyncio import sleep
                from js import pyscriptGlobals
                from pyodide.ffi import run_sync as run

                import sys
                import builtins

                signals = {
                    '\\x03': KeyboardInterrupt,
                    '\\x1a': EOFError
                }

                async def async_readline():
                    inputQueue = pyscriptGlobals.inputQueue
                    linesQueue = pyscriptGlobals.linesQueue
                    processInputCharacter = pyscriptGlobals.processInputCharacter

                    pyscriptGlobals.isWaitingForInput = True

                    while inputQueue.length > 0:
                        processInputCharacter(inputQueue.shift())
                        if linesQueue:
                            return linesQueue.shift()

                    while not linesQueue:
                        await sleep(0.1)

                    pyscriptGlobals.isWaitingForInput = False

                    return linesQueue.shift()

                def readline():
                    line = run(async_readline())
                    if line in signals:
                        raise signals[line]
                    return line

                def input(prompt=''):
                    if prompt:
                        print(end=prompt, flush=True)
                    return readline()

                sys.stdin.readline = readline
                builtins.input = input
            `);

            await pyodide.loadPackage('micropip');
            const micropip = pyodide.pyimport('micropip');

            terminal.write('Loading pyscript\r\n');
            await micropip.install('pyscript-programming-language');

            // prepare libraries to browser environment
            await runPythonAsync(`
                import js
                import pyscript

                pys_sys = pyscript.pys_require('sys')
                pys_sys.clearhook = lambda : js.pyscriptGlobals.terminal.clear()

                history = pyscript.pys_require('history')
                history.MAXIMUM_HISTORY_LINE = js.pyscriptGlobals.MAXIMUM_HISTORY_LINE
                history.load = lambda : list(reversed(js.pyscriptGlobals.history))
                history.append = lambda string : js.pyscriptGlobals.history.push(string) and None
                history.clear = lambda : js.pyscriptGlobals.clearHistory() and None
            `);

            terminal.clear();
            terminal.write(`Welcome to the PyScript Shell using Xterm.js and Pyodide ${pyodide.version}\r\n`);

            // run shell
            await runPythonAsync(`
                import js
                import pyscript

                js.pyscriptGlobals.exitCode = pyscript.pys_shell(pyscript.undefined, pyscript.CLASSIC_LINE_SHELL)
            `);

            disposable.dispose();
            cursor = 0;
            historyCursor = 0;
            history.length = 0;
            inputQueue.length = 0;
            linesQueue.length = 0;
            lineBuffer.length = 0;

            terminal.write(
                pyscriptGlobals.exitCode === 0 ?
                `\r\n\x1b[36m** Process exited - Return Code: 0 **\x1b[0m\r\n` :
                `\r\n\x1b[31m** Process exited - Return Code: ${JSON.stringify(pyscriptGlobals.exitCode)} **\x1b[0m\r\n`
            );
        </script>
    </body>
</html>
